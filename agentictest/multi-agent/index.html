<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Ensemble - Multi-Agent Pattern</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a12;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center}
  h1{font-size:1.6rem;margin-top:18px;letter-spacing:1px;color:#fff}
  .subtitle{font-size:.82rem;color:#888;margin:4px 0 10px;letter-spacing:.5px}
  .subtitle span{color:#ce93d8}

  /* Main layout */
  .main{display:flex;flex:1;width:100%;max-width:1200px;gap:10px;padding:0 16px;min-height:0}
  .stage-wrap{flex:1;position:relative;min-width:0}
  canvas#stage{width:100%;height:100%;display:block}

  /* Side panel */
  .side{width:260px;display:flex;flex-direction:column;gap:8px;padding:8px 0;flex-shrink:0}
  .controls{background:#12121e;border:1px solid #1e1e30;border-radius:10px;padding:14px}
  .controls label{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:#aaa;margin-bottom:8px}
  .controls input[type=range]{width:120px;accent-color:#ce93d8}
  .btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-start{background:linear-gradient(135deg,#64b5f6,#ce93d8);color:#0a0a12}
  .btn-start:hover{filter:brightness(1.15)}
  .btn-stop{background:#2a1a1a;color:#ff8a65;border:1px solid #ff8a6555}
  .btn-stop:hover{background:#3a2020}

  /* Log */
  .log-wrap{flex:1;background:#12121e;border:1px solid #1e1e30;border-radius:10px;display:flex;flex-direction:column;min-height:0}
  .log-title{font-size:.78rem;color:#888;padding:10px 12px 4px;letter-spacing:.5px}
  .log{flex:1;overflow-y:auto;padding:4px 12px 10px;font-size:.72rem;font-family:'Cascadia Code','Fira Code',monospace}
  .log::-webkit-scrollbar{width:4px}
  .log::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .log-entry{padding:3px 0;border-bottom:1px solid #ffffff08;line-height:1.4}
  .log-entry .from{font-weight:700}
  .log-entry .arrow{color:#555}
  .log-entry .msg{color:#bbb}

  /* Agent legend */
  .legend{display:flex;justify-content:center;gap:18px;padding:6px 0 10px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#999}
  .legend-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<h1>Jazz Ensemble</h1>
<p class="subtitle"><span>Multi-Agent Pattern</span> &mdash; specialized agents communicate, coordinate, and collaborate</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#64b5f6"></div>Piano</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8a65"></div>Bass</div>
  <div class="legend-item"><div class="legend-dot" style="background:#81c784"></div>Drums</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ce93d8"></div>Sax</div>
</div>

<div class="main">
  <div class="stage-wrap">
    <canvas id="stage"></canvas>
  </div>
  <div class="side">
    <div class="controls">
      <button id="btnToggle" class="btn btn-start" onclick="toggleJam()">Start Jam</button>
      <div style="height:12px"></div>
      <label>Tempo <span id="tempoVal">120</span> BPM
        <input type="range" id="tempoSlider" min="60" max="200" value="120" oninput="setTempo(this.value)">
      </label>
      <label>Energy <span id="energyVal">50</span>%
        <input type="range" id="energySlider" min="10" max="100" value="50" oninput="setEnergy(this.value)">
      </label>
    </div>
    <div class="log-wrap">
      <div class="log-title">AGENT CONVERSATION LOG</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<script>
// ─── Audio Context ──────────────────────────────────────────
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}

// ─── State ──────────────────────────────────────────────────
let running = false, tempo = 120, energy = 0.5;
let beatInterval = null, beatCount = 0, leaderIdx = 0;
const HANDOFF_EVERY = 16; // beats before leadership rotates
const SCALES = {
  Dm:  [62,64,65,67,69,70,72,74],
  Am:  [57,59,60,62,64,65,67,69],
  Gm:  [55,57,58,60,62,63,65,67],
  Cm:  [60,62,63,65,67,68,70,72],
};
let currentKey = 'Dm';
let keyNotes = SCALES[currentKey];

// ─── Agents ─────────────────────────────────────────────────
const agents = [
  { id:0, name:'Piano',  emoji:'\uD83C\uDFB9', color:'#64b5f6', state:'listening', activity:0, lastNote:65, role:'chords' },
  { id:1, name:'Bass',   emoji:'\uD83C\uDFB8', color:'#ff8a65', state:'listening', activity:0, lastNote:45, role:'bass' },
  { id:2, name:'Drums',  emoji:'\uD83E\uDD41', color:'#81c784', state:'listening', activity:0, lastNote:0,  role:'drums' },
  { id:3, name:'Sax',    emoji:'\uD83C\uDFB7', color:'#ce93d8', state:'listening', activity:0, lastNote:69, role:'melody' },
];

// Positions (computed on resize): top, left, right, bottom diamond
let agentPos = [];
function computePositions(w, h) {
  const cx = w/2, cy = h/2, rx = Math.min(w,h)*0.32;
  agentPos = [
    {x:cx, y:cy - rx},          // Piano top
    {x:cx - rx, y:cy},          // Bass left
    {x:cx + rx, y:cy},          // Drums right
    {x:cx, y:cy + rx},          // Sax bottom
  ];
}

// ─── Messages / Animations ──────────────────────────────────
let messages = [];   // {fromIdx, toIdx, text, t (0-1), color}
let particles = [];  // glow particles

function addMessage(fromIdx, toIdx, text) {
  const c = agents[fromIdx].color;
  if (toIdx === -1) {
    // broadcast
    for (let i = 0; i < 4; i++) if (i !== fromIdx) messages.push({fromIdx, toIdx:i, text, t:0, color:c});
  } else {
    messages.push({fromIdx, toIdx, text, t:0, color:c});
  }
  logMessage(agents[fromIdx].name, toIdx===-1?'All':agents[toIdx].name, text);
}

// ─── Log ────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function logMessage(from, to, msg) {
  const agent = agents.find(a=>a.name===from);
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="from" style="color:${agent?agent.color:'#fff'}">${from}</span> <span class="arrow">\u2192</span> <span class="from">${to}</span>: <span class="msg">${msg}</span>`;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
  if (logEl.children.length > 120) logEl.removeChild(logEl.firstChild);
}

// ─── Canvas ─────────────────────────────────────────────────
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = r.width * devicePixelRatio;
  H = canvas.height = r.height * devicePixelRatio;
  canvas.style.width = r.width+'px';
  canvas.style.height = r.height+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  computePositions(r.width, r.height);
}
window.addEventListener('resize', resize);

// ─── Draw ───────────────────────────────────────────────────
function draw() {
  const w = W/devicePixelRatio, h = H/devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  // Connection lines (dim)
  ctx.lineWidth = 1;
  for (let i=0;i<4;i++) for (let j=i+1;j<4;j++) {
    const a=agentPos[i], b=agentPos[j];
    ctx.strokeStyle = '#ffffff08';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }

  // Animated messages
  for (let m of messages) {
    const a=agentPos[m.fromIdx], b=agentPos[m.toIdx];
    const x = a.x+(b.x-a.x)*m.t, y = a.y+(b.y-a.y)*m.t;
    // glowing line segment
    const grad = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    grad.addColorStop(Math.max(0,m.t-.15), 'transparent');
    grad.addColorStop(m.t, m.color+'cc');
    grad.addColorStop(Math.min(1,m.t+.02), 'transparent');
    ctx.strokeStyle = grad; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    // dot
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=m.color; ctx.fill();
    ctx.shadowColor=m.color; ctx.shadowBlur=10;
    ctx.fill(); ctx.shadowBlur=0;
    // text label
    if (m.t > 0.2 && m.t < 0.8) {
      ctx.font='bold 10px "Segoe UI",sans-serif';
      ctx.fillStyle=m.color+'dd';
      ctx.fillText(m.text, x+8, y-6);
    }
  }

  // Particles
  for (let p of particles) {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
  }

  // Agent circles
  const baseR = Math.min(w,h)*0.085;
  for (let i=0;i<4;i++){
    const ag=agents[i], pos=agentPos[i];
    if(!pos) continue;
    const r = baseR;
    const isLead = running && i===leaderIdx;

    // Outer pulsing ring
    if (ag.activity > 0) {
      const pulseR = r + 6 + ag.activity*8 + Math.sin(Date.now()/200)*3;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,pulseR,0,Math.PI*2);
      ctx.strokeStyle=ag.color+ (isLead?'88':'44');
      ctx.lineWidth= isLead?3:1.5;
      ctx.stroke();
    }

    // Leader crown ring
    if (isLead) {
      const crownR = r+14+Math.sin(Date.now()/300)*2;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,crownR,0,Math.PI*2);
      ctx.strokeStyle=ag.color+'33'; ctx.lineWidth=8; ctx.stroke();
      ctx.setLineDash([6,6]); ctx.strokeStyle=ag.color+'66'; ctx.lineWidth=2;
      ctx.stroke(); ctx.setLineDash([]);
    }

    // Main circle
    const grd=ctx.createRadialGradient(pos.x-r*0.2,pos.y-r*0.3,r*0.1,pos.x,pos.y,r);
    grd.addColorStop(0, ag.color+'55');
    grd.addColorStop(1, ag.color+'18');
    ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
    ctx.fillStyle=grd; ctx.fill();
    ctx.strokeStyle=ag.color+(isLead?'cc':'66'); ctx.lineWidth=isLead?2.5:1.5; ctx.stroke();

    // Emoji
    ctx.font=`${r*0.55}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ag.emoji, pos.x, pos.y - r*0.12);

    // Name
    ctx.font=`bold ${Math.max(10,r*0.24)}px "Segoe UI",sans-serif`;
    ctx.fillStyle='#fff';
    ctx.fillText(ag.name, pos.x, pos.y + r*0.38);

    // State
    ctx.font=`${Math.max(8,r*0.18)}px "Segoe UI",sans-serif`;
    ctx.fillStyle=ag.color+'bb';
    const stateText = isLead ? '\u2B50 LEAD: '+ag.state : ag.state;
    ctx.fillText(stateText, pos.x, pos.y + r*0.6);
  }

  requestAnimationFrame(draw);
}

// ─── Update loop (independent of draw) ─────────────────────
function update() {
  // Messages
  for (let i=messages.length-1;i>=0;i--){
    messages[i].t += 0.025;
    if (messages[i].t >= 1) messages.splice(i,1);
  }
  // Particles
  for (let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.alpha-=0.015; p.r*=0.98;
    if (p.alpha<=0) particles.splice(i,1);
  }
  // Decay activity
  for (let a of agents) a.activity *= 0.95;

  setTimeout(update, 16);
}
update();

// ─── Midi note to frequency ─────────────────────────────────
function mtof(m){return 440*Math.pow(2,(m-69)/12)}

// ─── Instrument Synths ──────────────────────────────────────
function playPiano(notes, dur, vol) {
  ensureAudio();
  const now = actx.currentTime;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(vol*0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+dur);
  gain.connect(actx.destination);
  for (const n of notes) {
    const osc = actx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = mtof(n);
    osc.connect(gain);
    osc.start(now);
    osc.stop(now+dur);
  }
  spawnParticles(0);
}

function playBass(note, dur, vol) {
  ensureAudio();
  const now = actx.currentTime;
  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = mtof(note);
  const g = actx.createGain();
  g.gain.setValueAtTime(vol*0.25, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+dur);
  osc.connect(g); g.connect(actx.destination);
  osc.start(now); osc.stop(now+dur);
  spawnParticles(1);
}

function playDrumKick(vol) {
  ensureAudio();
  const now = actx.currentTime;
  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(30, now+0.15);
  const g = actx.createGain();
  g.gain.setValueAtTime(vol*0.35, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.2);
  osc.connect(g); g.connect(actx.destination);
  osc.start(now); osc.stop(now+0.25);
}

function playDrumHat(vol) {
  ensureAudio();
  const now = actx.currentTime;
  const bufSize = actx.sampleRate * 0.05;
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const hp = actx.createBiquadFilter();
  hp.type='highpass'; hp.frequency.value=7000;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol*0.12, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.06);
  src.connect(hp); hp.connect(g); g.connect(actx.destination);
  src.start(now);
}

function playDrumSnare(vol) {
  ensureAudio();
  const now = actx.currentTime;
  const bufSize = actx.sampleRate * 0.1;
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const bp = actx.createBiquadFilter();
  bp.type='bandpass'; bp.frequency.value=3000; bp.Q.value=1;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol*0.2, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
  src.connect(bp); bp.connect(g); g.connect(actx.destination);
  src.start(now);
}

function playSax(note, dur, vol) {
  ensureAudio();
  const now = actx.currentTime;
  const osc = actx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = mtof(note);
  // vibrato
  const lfo = actx.createOscillator();
  lfo.frequency.value = 5.5;
  const lfoG = actx.createGain();
  lfoG.gain.value = 3;
  lfo.connect(lfoG); lfoG.connect(osc.frequency);
  lfo.start(now); lfo.stop(now+dur);
  // filter
  const flt = actx.createBiquadFilter();
  flt.type='lowpass'; flt.frequency.value=1800; flt.Q.value=4;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.001, now);
  g.gain.linearRampToValueAtTime(vol*0.12, now+0.04);
  g.gain.setValueAtTime(vol*0.12, now+dur*0.7);
  g.gain.exponentialRampToValueAtTime(0.001, now+dur);
  osc.connect(flt); flt.connect(g); g.connect(actx.destination);
  osc.start(now); osc.stop(now+dur);
  spawnParticles(3);
}

function spawnParticles(agentIdx) {
  const pos = agentPos[agentIdx]; if(!pos) return;
  const c = agents[agentIdx].color;
  for (let i=0;i<5;i++){
    const angle = Math.random()*Math.PI*2;
    particles.push({
      x:pos.x, y:pos.y,
      vx:Math.cos(angle)*(1+Math.random()*2),
      vy:Math.sin(angle)*(1+Math.random()*2),
      r:2+Math.random()*3, alpha:0.7, color:c
    });
  }
}

// ─── Agent AI / Beat Logic ──────────────────────────────────
function pickNote(scaleNotes, near, range) {
  const candidates = scaleNotes.filter(n => Math.abs(n-near) <= range);
  return candidates.length ? candidates[Math.floor(Math.random()*candidates.length)] : scaleNotes[Math.floor(Math.random()*scaleNotes.length)];
}

function onBeat() {
  beatCount++;
  const beatInBar = beatCount % 4;
  const isLead = (idx) => idx === leaderIdx;
  const e = energy;
  const beatDur = 60/tempo;

  // ── Leadership handoff ──
  if (beatCount % HANDOFF_EVERY === 0 && beatCount > 0) {
    const prev = leaderIdx;
    leaderIdx = (leaderIdx + 1) % 4;
    agents[prev].state = 'adapting';
    agents[leaderIdx].state = 'playing';
    addMessage(prev, leaderIdx, "your turn to lead!");
    // Occasionally change key
    if (Math.random() < 0.4) {
      const keys = Object.keys(SCALES);
      const newKey = keys[Math.floor(Math.random()*keys.length)];
      if (newKey !== currentKey) {
        currentKey = newKey;
        keyNotes = SCALES[currentKey];
        addMessage(leaderIdx, -1, `key: ${currentKey}`);
      }
    }
    addMessage(leaderIdx, -1, `intensity: ${e>0.65?'high':e>0.35?'mid':'low'}`);
  }

  // ── Piano Agent ──
  const piano = agents[0];
  if (beatInBar === 0 || (isLead(0) && Math.random()<0.6) || Math.random()<e*0.4) {
    piano.state = isLead(0)?'playing':'adapting';
    piano.activity = 1;
    const root = keyNotes[0];
    const third = keyNotes[2];
    const fifth = keyNotes[4];
    const seventh = keyNotes.length>6?keyNotes[6]:keyNotes[5];
    const vol = isLead(0) ? 0.9+e*0.3 : 0.4+e*0.3;
    const chordNotes = isLead(0) ? [root,third,fifth,seventh] : [root,third,fifth];
    playPiano(chordNotes, beatDur*(isLead(0)?1.5:0.8), vol);
    piano.lastNote = root;
    if (beatInBar===0 && Math.random()<0.3) addMessage(0,-1,`switching to ${currentKey}7`);
  } else {
    piano.state = 'listening';
  }

  // ── Bass Agent ──
  const bass = agents[1];
  const bassScale = keyNotes.map(n=>n-12); // one octave down
  if (beatInBar===0 || beatInBar===2 || (isLead(1)&&Math.random()<0.7) || Math.random()<e*0.3) {
    bass.state = isLead(1)?'playing':'adapting';
    bass.activity = 1;
    let note;
    if (isLead(1)) {
      note = pickNote(bassScale, bass.lastNote, 5);
    } else {
      // follow piano root
      note = bassScale[0] + (beatInBar===2?7:0);
    }
    const vol = isLead(1)?1:0.5+e*0.3;
    playBass(note, beatDur*(isLead(1)?0.8:0.5), vol);
    bass.lastNote = note;
    if (Math.random()<0.15) addMessage(1,0,"following Piano's chord");
  } else {
    bass.state = 'listening';
  }

  // ── Drums Agent ──
  const drums = agents[2];
  drums.state = isLead(2)?'playing':'adapting';
  drums.activity = 0.6;
  const drumVol = isLead(2)?1:0.5+e*0.4;
  // Kick on 1 and 3
  if (beatInBar===0||beatInBar===2) { playDrumKick(drumVol); drums.activity=1; }
  // Snare on 2 and 4
  if (beatInBar===1||beatInBar===3) { playDrumSnare(drumVol*0.8); drums.activity=1; }
  // Hi-hat
  playDrumHat(drumVol*0.5);
  // Extra hits when leading or high energy
  if ((isLead(2)||e>0.6) && Math.random()<e*0.5) {
    setTimeout(()=>{playDrumHat(drumVol*0.3); drums.activity=0.8;}, (beatDur*250));
  }
  if (isLead(2) && Math.random()<0.2) addMessage(2,-1,`tempo: ${tempo}`);
  spawnParticles(2);

  // ── Sax Agent ──
  const sax = agents[3];
  const shouldPlay = isLead(3) ? (Math.random()<0.85) : (Math.random()<e*0.5);
  if (shouldPlay) {
    sax.state = isLead(3)?'playing':'adapting';
    sax.activity = 1;
    const range = isLead(3)?7:4;
    const note = pickNote(keyNotes, sax.lastNote, range);
    const dur = isLead(3) ? beatDur*(0.4+Math.random()*0.8) : beatDur*0.4;
    const vol = isLead(3)?1:0.35+e*0.2;
    playSax(note, dur, vol);
    sax.lastNote = note;
    if (isLead(3) && Math.random()<0.2) addMessage(3,-1,"taking the solo");
    if (!isLead(3) && Math.random()<0.1) addMessage(3,2,"nice groove!");
  } else {
    sax.state = 'listening';
  }

  // Random inter-agent chatter
  if (Math.random()<0.08) {
    const from = Math.floor(Math.random()*4);
    let to = Math.floor(Math.random()*4);
    while(to===from) to=Math.floor(Math.random()*4);
    const chats = ["let's build it up","drop it down","nice!","I hear you","call and response?","trading fours?","stay on this groove"];
    addMessage(from, to, chats[Math.floor(Math.random()*chats.length)]);
  }
}

// ─── Controls ───────────────────────────────────────────────
function setTempo(v){
  tempo=+v;
  document.getElementById('tempoVal').textContent=v;
  if(running){ clearInterval(beatInterval); beatInterval=setInterval(onBeat, 60000/tempo); }
}
function setEnergy(v){
  energy=v/100;
  document.getElementById('energyVal').textContent=v;
}

function toggleJam(){
  const btn = document.getElementById('btnToggle');
  if(!running){
    ensureAudio();
    running=true;
    beatCount=0;
    leaderIdx=0;
    btn.textContent='Stop Jam';
    btn.className='btn btn-stop';
    agents[0].state='playing';
    logMessage('System','All','Jam session started! Piano takes the lead.');
    addMessage(0,-1,"let's go! key: "+currentKey);
    beatInterval=setInterval(onBeat, 60000/tempo);
  } else {
    running=false;
    clearInterval(beatInterval);
    btn.textContent='Start Jam';
    btn.className='btn btn-start';
    agents.forEach(a=>{a.state='listening';a.activity=0;});
    messages=[];
    logMessage('System','All','Jam session ended.');
  }
}

// ─── Init ───────────────────────────────────────────────────
resize();
draw();
</script>
</body>
